<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Вход | Шпион - Онлайн-игра</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .auth-container { max-width: 420px; margin: 60px auto; }
        .auth-tabs { display: flex; gap: 0; margin-bottom: 25px; }
        .auth-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-radius: 10px 10px 0 0; transition: all 0.3s; }
        .auth-tab.active { background: rgba(77, 184, 255, 0.2); border: 1px solid rgba(77, 184, 255, 0.5); }
        .auth-tab:not(.active) { background: rgba(255,255,255,0.05); }
        .auth-tab:hover:not(.active) { background: rgba(255,255,255,0.1); }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-nav { text-align: center; margin-top: 20px; }
        .auth-nav a { color: #4db8ff; text-decoration: none; }
        .auth-nav a:hover { text-decoration: underline; }
        .back-home { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; color: #4db8ff; text-decoration: none; }
        .back-home:hover { text-decoration: underline; }
        .privacy-consent { margin-top: 4px; }
        .privacy-consent-label { display: flex; align-items: flex-start; gap: 10px; font-weight: normal; cursor: pointer; line-height: 1.45; }
        .privacy-consent-label input[type="checkbox"] { margin-top: 4px; flex-shrink: 0; width: auto; cursor: pointer; }
        .privacy-consent-label a { color: #4db8ff; text-decoration: underline; }
        .privacy-consent-label a:hover { color: #7cc8ff; }
    </style>
</head>
<body class="dark-theme">
    <div class="emoji-rain"></div>
    <div class="container">
        <header style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <h1><a href="/" style="color: inherit; text-decoration: none;"><i class="fas fa-user-secret"></i> ШПИОН</a></h1>
            <div class="header-search" style="flex: 1; max-width: 280px; position: relative;">
                <input type="text" id="headerSearch" placeholder="Поиск по юзернейму..." autocomplete="off" style="width: 100%; padding: 8px 12px 8px 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: inherit;">
                <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; pointer-events: none;"></i>
                <div id="headerSearchResults" class="search-results-dropdown" style="display: none; position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: rgba(30,40,50,0.98); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; max-height: 280px; overflow-y: auto; z-index: 1000;"></div>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 20px;">
                <div id="authLinks" style="display: flex; align-items: center; gap: 15px;">
                    <div id="notificationsWrap" style="position: relative; display: none;">
                        <button id="notificationsBell" class="sound-toggle-btn" title="Уведомления">
                            <i class="fas fa-bell"></i>
                            <span id="notificationsBadge">0</span>
                        </button>
                        <div id="notificationsDropdown" class="notifications-dropdown" style="display: none;"></div>
                    </div>
                    <a href="/login" id="loginLink" style="color: #4db8ff; text-decoration: none;"><i class="fas fa-sign-in-alt"></i> Войти</a>
                    <a href="/profile" id="profileLink" style="color: #4db8ff; text-decoration: none; display: none;"><i class="fas fa-user" style="margin-right: 6px;"></i><span id="userDisplayName">Профиль</span></a>
                    <a href="/leaderboard" style="color: #4db8ff; text-decoration: none;"><i class="fas fa-trophy"></i> Рейтинг</a>
                    <a href="/messages" id="messagesLink" style="color: #4db8ff; text-decoration: none; display: none;"><i class="fas fa-comments"></i> Сообщения</a>
                    <a href="/clubs" id="clubsLink" style="color: #4db8ff; text-decoration: none; display: none;"><i class="fas fa-users"></i> Клубы</a>
                    <a href="/admin" id="adminLink" style="color: #ffd700; text-decoration: none; display: none;"><i class="fas fa-shield-alt"></i> Админ‑панель</a>
                    <a href="#" id="logoutLink" style="color: #ff6b6b; text-decoration: none; display: none;">Выйти</a>
                </div>
                <div class="theme-toggle-container" style="margin-top: 4px;">
                    <button id="soundToggleBtn" class="sound-toggle-btn" title="Вкл/Выкл звуки">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <span class="theme-label">🌙</span>
                    <label class="switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="slider"></span>
                    </label>
                    <span class="theme-label">☀️</span>
                    <button id="emojiToggleBtn" class="emoji-toggle-btn" title="Вкл/Выкл падающие эмодзи">
                        <i class="fas fa-cloud-moon"></i>
                    </button>
                    <button id="infoAboutSiteBtn" class="sound-toggle-btn" title="О сайте и игре">
                        <i class="fas fa-info-circle"></i>
                    </button>
                </div>
            </div>
        </header>

        <main>
            <div class="auth-container">
                <div class="card">
                    <div class="auth-tabs">
                        <div class="auth-tab active" data-tab="login">Вход</div>
                        <div class="auth-tab" data-tab="register">Регистрация</div>
                    </div>

                    <!-- Форма входа -->
                    <form id="loginForm" class="auth-form active">
                        <h2><i class="fas fa-sign-in-alt"></i> Вход в аккаунт</h2>
                        <div class="form-group">
                            <label for="loginUsername">Логин:</label>
                            <input type="text" id="loginUsername" placeholder="Введите логин" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Пароль:</label>
                            <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                        </div>
                        <div id="loginError" class="error-container"></div>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </button>
                    </form>

                    <!-- Форма регистрации -->
                    <form id="registerForm" class="auth-form">
                        <h2><i class="fas fa-user-plus"></i> Регистрация</h2>
                        <div class="form-group">
                            <label for="regUsername">Логин:</label>
                            <input type="text" id="regUsername" placeholder="Придумайте логин (3-20 символов)" minlength="3" maxlength="20" required>
                        </div>
                        <div class="form-group">
                            <label for="regPassword">Пароль:</label>
                            <input type="password" id="regPassword" placeholder="Придумайте пароль (мин. 6 символов)" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label for="regPasswordConfirm">Подтвердите пароль:</label>
                            <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required>
                        </div>
                        <div class="form-group privacy-consent">
                            <label class="privacy-consent-label" for="regAcceptPrivacy">
                                <input type="checkbox" id="regAcceptPrivacy" required>
                                <span>Я даю свое согласие на обработку персональных данных и соглашаюсь с <a href="/privacy/" target="_blank" rel="noopener noreferrer">условиями и политикой конфиденциальности</a></span>
                            </label>
                        </div>
                        <div id="registerError" class="error-container"></div>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-user-plus"></i> Зарегистрироваться
                        </button>
                    </form>

                    <div class="auth-nav">
                        <p>Играть без аккаунта? <a href="/">Перейти к игре</a></p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Игра "Шпион" | Вход и регистрация | <a href="/privacy/" style="color: #4db8ff; text-decoration: none;">Политика конфиденциальности</a></p>
        </footer>
    </div>

    <script src="/info-about-site.js"></script>
    <script src="/header.js"></script>
    <script src="/site-header.js"></script>
    <script src="/auth.js"></script>
</body>
</html>
